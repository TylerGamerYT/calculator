<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body { background: #010409; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .calc-body { background: #0d1117; width: 350px; padding: 20px; border-radius: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); border: 1px solid #21262d; }
        
        /* Samsung style display */
        #display { 
            width: 100%; height: 100px; font-size: 40px; text-align: right; margin-bottom: 15px; 
            border: none; background: transparent; color: #f0f6fc; border-radius: 12px; padding: 10px; outline: none;
        }

        /* 4-column grid matching the image */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        /* General Button Style (Matching previous colors/vibe) */
        button { 
            padding: 18px 0; font-size: 16px; border: none; border-radius: 20px; cursor: pointer; 
            background: #21262d; color: #f0f6fc; transition: 0.1s;
        }
        button:hover { background: #30363d; }
        button:active { transform: scale(0.98); }

        /* Color classes from previous vibe */
        .fn { background: #161b22; color: #38bdf8; font-weight: bold; } /* Scientific blue */
        .op { background: #161b22; color: #0ea5e9; font-size: 20px; } /* Basic op blue */
        .ac { color: #f87171; font-weight: bold; } /* AC button Red */
        .eq { background: #0ea5e9; color: white; font-size: 24px; font-weight: bold; } /* Equals blue */

        /* Logic classes for JS */
        .active-mode { color: #10b981; } /* Green for Rad mode */
    </style>
</head>
<body>

<div class="calc-body">
    <input type="text" id="display" placeholder="0" readonly>
    <div class="grid">
        <button class="fn" onclick="math('pow2')">x²</button>
        <button class="fn" onclick="math('sqrt')">√</button>
        <button class="fn" onclick="math('abs')">|x|</button>
        <button class="fn" onclick="add('(')">(</button>

        <button class="fn" id="modeBtn" onclick="toggleMode()">Deg</button>
        <button class="fn" onclick="math('sin')">sin</button>
        <button class="fn" onclick="math('cos')">cos</button>
        <button class="fn" onclick="math('tan')">tan</button>

        <button class="fn" onclick="math('ln')">ln</button>
        <button class="fn" onclick="math('log')">log</button>
        <button class="fn" onclick="math('inv')">1/x</button>
        <button class="fn" onclick="add(')')">)</button>

        <button class="fn" onclick="math('exp')">eˣ</button>
        <button class="fn" onclick="math('powY')">xʸ</button>
        <button class="fn" onclick="math('pi')">π</button>
        <button class="fn" onclick="math('e')">e</button>

        <button class="ac" onclick="clr()">AC</button>
        <button class="ac" onclick="del()">←</button>
        <button class="op" onclick="add('%')">%</button>
        <button class="op" onclick="add('/')">÷</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="op" onclick="add('*')">×</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="op" onclick="add('-')">−</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="op" onclick="add('+')">+</button>

        <button onclick="math('plusMinus')">+/-</button>
        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button class="eq" onclick="solve()">=</button>
    </div>
</div>

<script>
    const s = document.getElementById('display');
    let isRadians = false; // Default to Degrees

    const add = v => s.value += v;
    const clr = () => s.value = "";
    const del = () => s.value = s.value.slice(0, -1);
    const solve = () => { try { s.value = eval(s.value); } catch { s.value = "Error"; } };

    // Toggles between Deg and Rad mode
    function toggleMode() {
        const btn = document.getElementById('modeBtn');
        isRadians = !isRadians;
        btn.innerText = isRadians ? "Rad" : "Deg";
        btn.classList.toggle('active-mode'); // Turns green in Rad mode
    }

    // Handles advanced math functions
    function math(type) {
        let v = parseFloat(s.value);
        if (isNaN(v)) return; // Don't crash if screen is empty

        switch(type) {
            case 'abs': s.value = Math.abs(v); break;
            case 'log': s.value = Math.log10(v).toFixed(4); break;
            case 'ln':  s.value = Math.log(v).toFixed(4); break;
            case 'pow2': s.value = Math.pow(v, 2); break;
            case 'inv': s.value = (1/v).toFixed(4); break;
            case 'exp': s.value = Math.exp(v).toFixed(4); break;
            case 'pi': s.value = Math.PI.toFixed(4); break; // Replaces current value
            case 'e': s.value = Math.E.toFixed(4); break; // Replaces current value
            case 'sqrt': s.value = Math.sqrt(v).toFixed(4); break;
            case 'powY': add('**'); break; // Types exponent syntax
            case 'plusMinus': s.value = v * -1; break;
            
            // Trig handles Deg/Rad mode
            case 'sin': s.value = isRadians ? Math.sin(v).toFixed(4) : Math.sin(v * Math.PI / 180).toFixed(4); break;
            case 'cos': s.value = isRadians ? Math.cos(v).toFixed(4) : Math.cos(v * Math.PI / 180).toFixed(4); break;
            case 'tan': s.value = isRadians ? Math.tan(v).toFixed(4) : Math.tan(v * Math.PI / 180).toFixed(4); break;
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .calc-body { background: #000; width: 100%; max-width: 360px; padding: 15px; box-sizing: border-box; }
        
        #display { 
            width: 100%; height: 160px; font-size: 56px; text-align: right; 
            border: none; background: transparent; color: #fff; outline: none; 
            padding: 20px 10px; margin-bottom: 10px;
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        button { 
            height: 72px; font-size: 20px; border: none; border-radius: 50px; cursor: pointer; 
            background: #1a1a1a; transition: 0.1s; display: flex; align-items: center; justify-content: center;
        }
        button:active { background: #333; }

        /* Number buttons = White */
        .num { color: #ffffff; }

        /* All other function/operator buttons = Blue */
        .blue-btn { color: #60a5fa; }
        
        /* Special case for AC and Equals to match Samsung's distinct feel */
        .ac { color: #f87171; } 
        .eq { background: #1e3a2e; color: #fff; font-size: 30px; } 

        .active-rad { color: #10b981 !important; }
    </style>
</head>
<body>

<div class="calc-body">
    <input type="text" id="display" placeholder="0" readonly>

    <div class="grid">
        <button class="blue-btn" onclick="add('**-1')">⇋</button>
        <button class="blue-btn" id="modeBtn" onclick="toggleMode()">Rad</button>
        <button class="blue-btn" onclick="math('sqrt')">√</button>
        <button class="blue-btn" onclick="math('abs')">|x|</button>

        <button class="blue-btn" onclick="math('sin')">sin</button>
        <button class="blue-btn" onclick="math('cos')">cos</button>
        <button class="blue-btn" onclick="math('tan')">tan</button>
        <button class="blue-btn" onclick="math('pi')">π</button>

        <button class="blue-btn" onclick="math('ln')">ln</button>
        <button class="blue-btn" onclick="math('log')">log</button>
        <button class="blue-btn" onclick="math('inv')">1/x</button>
        <button class="blue-btn" onclick="math('e')">e</button>

        <button class="blue-btn" onclick="math('exp')">eˣ</button>
        <button class="blue-btn" onclick="math('pow2')">x²</button>
        <button class="blue-btn" onclick="add('**')">xʸ</button>
        <button class="blue-btn" onclick="del()">⌫</button>

        <button class="ac" onclick="clr()">C</button>
        <button class="blue-btn" onclick="add('(')">( )</button>
        <button class="blue-btn" onclick="add('%')">%</button>
        <button class="blue-btn" onclick="add('/')">÷</button>

        <button class="num" onclick="add('7')">7</button>
        <button class="num" onclick="add('8')">8</button>
        <button class="num" onclick="add('9')">9</button>
        <button class="blue-btn" onclick="add('*')">×</button>

        <button class="num" onclick="add('4')">4</button>
        <button class="num" onclick="add('5')">5</button>
        <button class="num" onclick="add('6')">6</button>
        <button class="blue-btn" onclick="add('-')">−</button>

        <button class="num" onclick="add('1')">1</button>
        <button class="num" onclick="add('2')">2</button>
        <button class="num" onclick="add('3')">3</button>
        <button class="blue-btn" onclick="add('+')">+</button>

        <button class="blue-btn" onclick="math('plusMinus')">+/-</button>
        <button class="num" onclick="add('0')">0</button>
        <button class="num" onclick="add('.')">.</button>
        <button class="eq" onclick="solve()">=</button>
    </div>
</div>

<script>
    const s = document.getElementById('display');
    let isRad = true;

    const add = v => { if(s.value === "Error") s.value = ""; s.value += v; };
    const clr = () => s.value = "";
    const del = () => s.value = s.value.slice(0, -1);
    
    function solve() {
        try {
            let expr = s.value.replace(/×/g, '*').replace(/÷/g, '/');
            s.value = eval(expr);
        } catch { s.value = "Error"; }
    }

    function toggleMode() {
        isRad = !isRad;
        const btn = document.getElementById('modeBtn');
        btn.innerText = isRad ? "Rad" : "Deg";
        btn.classList.toggle('active-rad');
    }

    function math(type) {
        let v = parseFloat(s.value) || 0;
        switch(type) {
            case 'abs': s.value = Math.abs(v); break;
            case 'log': s.value = Math.log10(v).toFixed(4); break;
            case 'ln':  s.value = Math.log(v).toFixed(4); break;
            case 'pow2': s.value = Math.pow(v, 2); break;
            case 'inv': s.value = (1/v).toFixed(4); break;
            case 'exp': s.value = Math.exp(v).toFixed(4); break;
            case 'pi': s.value += Math.PI.toFixed(4); break;
            case 'e': s.value += Math.E.toFixed(4); break;
            case 'sqrt': s.value = Math.sqrt(v).toFixed(4); break;
            case 'plusMinus': s.value = v * -1; break;
            case 'sin': s.value = isRad ? Math.sin(v).toFixed(4) : Math.sin(v * Math.PI / 180).toFixed(4); break;
            case 'cos': s.value = isRad ? Math.cos(v).toFixed(4) : Math.cos(v * Math.PI / 180).toFixed(4); break;
            case 'tan': s.value = isRad ? Math.tan(v).toFixed(4) : Math.tan(v * Math.PI / 180).toFixed(4); break;
        }
    }
</script>
</body>
</html>

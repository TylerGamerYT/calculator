<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .calc-body { background: #1e293b; width: 360px; padding: 25px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        #display { 
            width: 100%; height: 70px; font-size: 32px; text-align: right; margin-bottom: 20px; 
            border: none; background: #0f172a; color: #38bdf8; border-radius: 15px; padding: 15px;
            outline: none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        button { 
            padding: 15px; font-size: 16px; border: none; border-radius: 12px; cursor: pointer; 
            background: #334155; color: #f1f5f9; transition: all 0.2s ease;
        }

        button:hover { background: #475569; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .scientific { background: #1e3a8a; color: #93c5fd; font-size: 14px; font-weight: bold; }
        .operator { background: #0369a1; color: white; font-size: 20px; }
        .equals { background: #0ea5e9; grid-column: span 2; font-weight: bold; }
        .clear { background: #be123c; color: white; }
    </style>
</head>
<body>

<div class="calc-body">
    <input type="text" id="display" placeholder="0" readonly>
    <div class="grid">
        <button class="scientific" onclick="mathFunc('sin')">sin</button>
        <button class="scientific" onclick="mathFunc('cos')">cos</button>
        <button class="scientific" onclick="mathFunc('tan')">tan</button>
        <button class="scientific" onclick="mathFunc('log')">log</button>

        <button class="scientific" onclick="mathFunc('sqrt')">√</button>
        <button class="scientific" onclick="mathFunc('pow')">x²</button>
        <button class="scientific" onclick="mathFunc('pi')">π</button>
        <button class="scientific" onclick="mathFunc('exp')">e</button>

        <button class="clear" onclick="clearDisplay()">AC</button>
        <button class="clear" onclick="backspace()">DEL</button>
        <button class="operator" onclick="add('/')">÷</button>
        <button class="operator" onclick="add('*')">×</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="operator" onclick="add('-')">−</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="operator" onclick="add('+')">+</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="equals" onclick="solve()">=</button>

        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
    </div>
</div>

<script>
    const screen = document.getElementById('display');

    function add(val) { screen.value += val; }
    function clearDisplay() { screen.value = ""; }
    function backspace() { screen.value = screen.value.slice(0, -1); }

    function solve() {
        try { screen.value = eval(screen.value); }
        catch { screen.value = "Error"; }
    }

    function mathFunc(type) {
        let val = parseFloat(screen.value) || 0;
        switch(type) {
            case 'sin': screen.value = Math.sin(val * Math.PI / 180).toFixed(4); break;
            case 'cos': screen.value = Math.cos(val * Math.PI / 180).toFixed(4); break;
            case 'tan': screen.value = Math.tan(val * Math.PI / 180).toFixed(4); break;
            case 'log': screen.value = Math.log10(val).toFixed(4); break;
            case 'sqrt': screen.value = Math.sqrt(val).toFixed(4); break;
            case 'pow': screen.value = Math.pow(val, 2); break;
            case 'pi': screen.value += Math.PI.toFixed(4); break;
            case 'exp': screen.value += Math.E.toFixed(4); break;
        }
    }
</script>

</body>
</html>
